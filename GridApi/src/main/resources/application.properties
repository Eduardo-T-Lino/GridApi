spring.application.name=GridApi

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080

# ===================================================================
# H2 DATASOURCE CONFIGURATION
# ===================================================================
# Defines the in-memory database instance name (e.g., testdb)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# H2 CONSOLE CONFIGURATION
# ===================================================================
# Enables the browser-based H2 database console GUI
spring.h2.console.enabled=true
# Sets a custom URL path to access the console (e.g., http://localhost:8080/h2-console)
spring.h2.console.path=/h2-console
# Allows frames so the console UI can render correctly in your browser
spring.h2.console.settings.web-allow-others=false

# ===================================================================
# SPRING DATA JPA & HIBERNATE CONFIGURATION
# ===================================================================
# Automatically creates, updates, or drops tables based on your JPA @Entity classes
spring.jpa.hibernate.ddl-auto=update
# Prints generated SQL queries to the system console for easy debugging
spring.jpa.show-sql=true
# Formats the printed SQL queries to make them highly readable
spring.jpa.properties.hibernate.format_sql=true
# Forces Hibernate to target H2 syntax rules precisely
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===================================================================
# SWAGGER / OPENAPI 3 CONFIGURATION
# ===================================================================
# Customizes the path where Swagger UI is served (Default: /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
# Customizes the endpoint where the raw JSON documentation is served
springdoc.api-docs.path=/api-docs
# Sorts the endpoints alphabetically by HTTP method in the UI interface
springdoc.swagger-ui.operationsSorter=method
